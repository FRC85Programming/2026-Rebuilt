<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooter Table Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>SHOOTER TABLE</h1>
            <div class="controls">
                <button class="undo-btn" id="undoBtn" disabled title="Undo (Ctrl+Z)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v6h6"></path>
                        <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
                    </svg>
                </button>
                <label class="toggle-container">
                    <span class="toggle-label">LIVE</span>
                    <input type="checkbox" id="liveToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                </div>
            </div>
        </header>

        <div class="chart-container">
            <canvas id="shooterChart"></canvas>
        </div>

        <div class="info-bar">
            <div class="info-item">
                <span class="info-value" id="currentDistance">--</span>
                <span class="info-label">m</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="pointCount">--</span>
                <span class="info-label">pts</span>
            </div>
        </div>
    </div>

    <script src="shooter-editor.js"></script>
</body>
</html>
